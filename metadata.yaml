---
bibliography: daftar-pustaka.bib
csl: ieee.csl
link-citations: true
booktabs: false
geometry: "top=3cm, bottom=3cm, left=4cm, right=3cm"
fontsize: 12pt
linestretch: 1.5
papersize: a4
documentclass: report
mainfont: "Times New Roman"
header-includes:
  - \usepackage{indentfirst}
  - \usepackage{graphicx}
  - \usepackage[table]{xcolor}
  - \usepackage{enumitem}

  # Paksa semua list (Enumerate & Itemize) untuk tidak punya jarak tambahan di atas/bawah
  - \setlist{nosep, leftmargin=1.27cm} 

  # --- PAKET UNTUK SPASI (WAJIB ADA) ---
  - \usepackage{setspace}
  # --- SETTING PENOMORAN BAB (SUPAYA BAB I tapi GAMBAR 1.1) ---
  - \renewcommand{\thechapter}{\Roman{chapter}}
  - \renewcommand{\thesection}{\arabic{chapter}.\arabic{section}}
  - \renewcommand{\thefigure}{\arabic{chapter}.\arabic{figure}}
  - \renewcommand{\thetable}{\arabic{chapter}.\arabic{table}}
  # --- SETTING BAHASA JUDUL DAFTAR ---
  - \renewcommand{\contentsname}{DAFTAR ISI}
  - \renewcommand{\listfigurename}{DAFTAR GAMBAR}
  - \renewcommand{\listtablename}{DAFTAR TABEL}
  - \renewcommand{\figurename}{Gambar}
  - \renewcommand{\tablename}{Tabel}
  - \renewcommand{\chaptername}{BAB}
  # --- ALIGNMENT ---
  - \setlength{\parindent}{1.27cm}
  
  # --- FORMAT JUDUL BAB & SUBBAB ---
  - \usepackage{titlesec}
  
  # --- JARAK ANTAR PARAGRAF (BEFORE/AFTER) ---
  # Ini membuat jarak antar paragraf menjadi 12pt (renggang).
  # PENTING: Karena kamu pakai indent (menjorok), ini bikin teks jadi "Menjorok + Berjarak".
  - \setlength{\parskip}{12pt}

  # 1. Format Tampilan BAB (Heading 1)
  # [display]      = Mode tumpuk ("BAB I" di baris atas, "PENDAHULUAN" di baris bawah)
  # \singlespacing = MEMAKSA judul jadi spasi 1 (Single), meski dokumennya spasi 2
  # {0pt}         = Jarak spasi antara tulisan "BAB I" dengan "PENDAHULUAN"
  - \titleformat{\chapter}[display]{\normalfont\bfseries\centering\singlespacing\setlength{\parskip}{0pt}}{\MakeUppercase{\chaptertitlename} \thechapter}{0pt}{\MakeUppercase}
  
  
  # 2. Mengatur Jarak Spasi (Before/After)
  # {0pt}  = Indentasi Kiri (biarkan 0)
  # {12pt} = SPACING BEFORE (Jarak dari margin atas ke tulisan "BAB I")
  # {0pt} = SPACING AFTER (Jarak dari Judul Bab ke teks paragraf pertama) -> Sesuaikan jika terlalu jauh/dekat
  - \titlespacing*{\chapter}{0pt}{-30pt}{0pt}

  # 3. Format Sub-Bab (Heading 2)
  # {12pt} = Spacing Before Sub-Bab
  # {12pt} = Spacing After Sub-Bab
  - \titleformat{\section}{\normalfont\bfseries}{\thesection}{1em}{}
  - \titlespacing*{\section}{0pt}{2pt}{0pt}

  # 4. Format Sub-Sub-Bab (Heading 3)
  # {12pt} = Spacing Before Sub-Sub-Bab
  # {12pt} = Spacing After Sub-Sub-Bab
  - \titleformat{\subsection}{\normalfont\bfseries}{\thesubsection}{1em}{}
  - \titlespacing*{\subsection}{0pt}{2pt}{0pt}

  # --- FORMAT CAPTION GAMBAR & TABEL ---
  - \usepackage{caption}
  
  # labelfont=bf membuat "Gambar 1.1" jadi Bold
  # textfont=normalfont membuat "Keterangan Gambar" jadi reguler (tidak bold)
  # labelsep=space memberikan spasi antara nomor dan keterangan
  # justification=centering agar caption selalu di tengah
  - \captionsetup[figure]{labelfont=bf, textfont=normalfont, labelsep=space, justification=centering}
  - \captionsetup[table]{labelfont=bf, textfont={normalfont, stretch=1}, labelsep=space, justification=raggedright, singlelinecheck=false, skip=0pt, margin=0pt,indention=0pt}

  # biar ga ada pemenggalan kata
  - \tolerance=1
  - \emergencystretch=\maxdimen
  - \hyphenpenalty=10000
  - \hbadness=10000

  # --- (BIAR GAMBAR DIEM DI TEMPAT) ---
  # H artinya Here
  - \usepackage{float}
  - \floatplacement{figure}{H}

  # --- KONFIGURASI KHUSUS TABEL ---
  # Memerlukan package etoolbox untuk menyuntikkan style ke dalam tabel
  - \usepackage{longtable}
  - \usepackage{multirow}
  - \usepackage{etoolbox}
  - \usepackage{array}
  - \setlength{\LTcapwidth}{\textwidth}
  - \setlength{\extrarowheight}{3pt} 

  # Aturan: Setiap kali tabel (longtable) dimulai, lakukan:
  # 1. singlespacing (Spasi 1.0)
  # 2. fontsize{10}{12} (Ukuran font 10pt, jarak baris 12pt)
  - \AtBeginEnvironment{longtable}{\singlespacing\fontsize{10}{12}\selectfont}

  # --- KONFIGURASI KHUSUS DAFTAR PUSTAKA ---
  # Maksa daftar pustaka (hasil generate citeproc) menggunakan spasi 1
  - \AtBeginEnvironment{CSLReferences}{\singlespacing}

  # Mengatur jarak SEBELUM dan SESUDAH tabel menjadi 0
  - \setlength{\LTpre}{0pt}
  - \setlength{\LTpost}{0pt}
  
  # 1. Buat variabel logika (Saklar) bernama \ifFrameImages, default mati (false)
  - \newif\ifFrameImages
  - \FrameImagesfalse

  # 2. Simpan perintah asli insert gambar ke variabel \OldIncludegraphics
  - \let\OldIncludegraphics\includegraphics

  # 3. Timpa perintah insert gambar dengan logika baru:
  #    "Jika saklar \ifFrameImages NYALA, maka kasih kotak (\fbox). Jika MATI, tampilkan biasa."
  - \renewcommand{\includegraphics}[2][]{\ifFrameImages\setlength{\fboxsep}{0pt}\setlength{\fboxrule}{0.5pt}\fbox{\OldIncludegraphics[#1]{#2}}\else\OldIncludegraphics[#1]{#2}\fi}

  # {1em} di posisi paling belakang berarti memberi jarak 1.5 enter ke elemen di bawahnya
  - \titlespacing*{name=\chapter,numberless}{0pt}{-30pt}{1em}
  - \usepackage[titles]{tocloft}
  - \usepackage[nottoc]{tocbibind}
  

  # --- MENAMBAHKAN "BAB" DI DAFTAR ISI ---
  - \renewcommand{\cftchappresnum}{BAB }
  # Menambah lebar ruang angka agar "BAB I" tidak menabrak judul teksnya
  - \addtolength{\cftchapnumwidth}{2em}
  # - \usepackage{tocloft}
  
  # 1. Mengatur font judul TOCTITLE (Daftar Isi), LOT (Tabel), LOF (Gambar)
  # Gaya: Bold (\bfseries), Center (\hfill), Uppercase (sudah dari renewcommand)
  # - \renewcommand{\cfttoctitlefont}{\hfil\normalfont\bfseries}
  # - \renewcommand{\cftaftertoctitle}{\hfil}
  # - \renewcommand{\cftlottitlefont}{\hfill\normalfont\bfseries}
  # - \renewcommand{\cftafterlottitle}{\hfill}
  # - \renewcommand{\cftloftitlefont}{\hfill\normalfont\bfseries}
  # - \renewcommand{\cftafterloftitle}{\hfill}

  # 2. Mengatur jarak (Spacing) sebelum dan sesudah judul DAFTAR agar sama dengan BAB
  # \titlespacing*{\chapter}{0pt}{-30pt}{0pt} tadi di atas, kita tiru di sini:
  # - \setlength{\cftbeforetoctitleskip}{-30pt}
  # - \setlength{\cftaftertoctitleskip}{12pt}
  # - \setlength{\cftbeforelottitleskip}{-30pt}
  # - \setlength{\cftafterlottitleskip}{12pt}
  # - \setlength{\cftbeforeloftitleskip}{-30pt}
  # - \setlength{\cftafterloftitleskip}{12pt}

  # --- KONFIGURASI DAFTAR LAMPIRAN ---
  - \newcommand{\listappendixname}{DAFTAR LAMPIRAN}
  - \newlistof{lampiran}{app}{\listappendixname}
  - \renewcommand{\cftlampiranleader}{\cftdotfill{\cftdotsep}}

  # Mengatur agar titik-titik di daftar isi muncul
  - \renewcommand{\cftdotsep}{1}
  - \renewcommand{\cftchapleader}{\cftdotfill{\cftdotsep}}
  - \renewcommand{\cftsecleader}{\cftdotfill{\cftdotsep}}
  - \renewcommand{\cftsubsecleader}{\cftdotfill{\cftdotsep}}
  - \renewcommand{\cftsubsubsecleader}{\cftdotfill{\cftdotsep}}
  # Memperkecil jarak antara titik terakhir ke nomor halaman
  # Default pnumwidth biasanya 1.55em dan rmarg 2.55em
  - \cftsetpnumwidth{1em}
  - \cftsetrmarg{1.5em}

  # Merapatkan jarak antar entri BAB di TOC:
  - \setlength{\cftbeforechapskip}{3pt}
  - \renewcommand{\cftchapafterpnum}{\vskip 3pt}
  - \setlength{\cftbeforesecskip}{0pt}
  - \setlength{\cftbeforesubsecskip}{0pt}
  - \setlength{\cftbeforesubsubsecskip}{0pt}

  # Level 0 = Chapter (#), Level 1 = Section (##)
  # Level 2 = Subsection (###), Level 3 = Subsubsection (####)
  - \setcounter{secnumdepth}{3}
  - \setcounter{tocdepth}{3}
  
toc-depth: 4
---